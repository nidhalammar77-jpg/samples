name: Flutter CI — iOS Only

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: form_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Debug build folder
        run: |
          echo "Listing build directory..."
          find build -maxdepth 5 -print

      - name: Package iOS app
        run: |
          APP_PATH=$(find build -type d -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found!"
            exit 1
          fi
          echo "Found app at $APP_PATH"
          zip -r ios-build.zip "$APP_PATH"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: form_app/ios-build.zip
